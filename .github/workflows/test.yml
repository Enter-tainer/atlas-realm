name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm fmt:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test:all

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm test:e2e
